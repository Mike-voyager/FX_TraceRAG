name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, types and tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install package and development dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Type check
        run: pyright src/tracerag tests

      - name: Test
        run: pytest -q
